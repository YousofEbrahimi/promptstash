name: Feature Request
description: Suggest a new feature for promptstash
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Want a feature? Tell us what you'd build!

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits?
      placeholder: "As a [user type], I want [goal] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: textarea
    id: pseudo
    attributes:
      label: "Implementation hints (optional)"
      description: API shape, CLI interface, etc. if you have ideas