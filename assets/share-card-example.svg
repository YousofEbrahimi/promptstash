<?xml version="1.0" encoding="UTF-8"?>
<!-- Example output of `promptstash share code-reviewer` — a social-ready card -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="6" fill="#6366f1"/>

  <text x="48" y="44" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">code-reviewer</text>
  <text x="48" y="68" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">
    <tspan fill="#6366f1" font-weight="600">#code </tspan>
    <tspan fill="#6366f1" font-weight="600">#review </tspan>
    <tspan fill="#6366f1" font-weight="600">#quality </tspan>
    • v3 • promptstash
  </text>

  <rect x="36" y="128" width="1128" height="224" fill="#1e293b" rx="12"/>
  <text x="48" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">You are an expert code reviewer. Review the following {{language}} code</text>
  <text x="48" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">and provide feedback on:</text>
  <text x="48" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">{{focusAreas}}</text>
  <text x="48" y="256" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">Consider:</text>
  <text x="48" y="286" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">- Logic errors and bugs</text>
  <text x="48" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">- Security vulnerabilities</text>
  <text x="48" y="326" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">- Performance issues</text>
</svg>